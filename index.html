<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Interactive Antibiotic Consumption Atlas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-primary shadow-sm">

<div class="container">

<span class="navbar-brand">

🗺️ Interactive Antibiotic Consumption Atlas

</span>

</div>

</nav>

<div class="container py-4">

<div class="row">

<div class="col-lg-3">

<div class="card shadow-sm">

<div class="card-body">

<h5>Select antibiotic</h5>

<input
id="search"
class="form-control mb-3"
placeholder="Search...">

<select
id="drugList"
class="form-select"
size="10">

</select>

<hr>

<h6 id="selectedDrug"></h6>

<a
id="openDW"
target="_blank"
class="btn btn-primary w-100">

Open in Datawrapper

</a>

</div>

</div>

</div>

<div class="col-lg-9">

<div class="card shadow">

<div class="card-body">

<iframe
id="atlas"
allowfullscreen>

</iframe>

</div>

</div>

</div>

</div>

<footer class="text-center mt-4">

<p>

Interactive Antibiotic Consumption Atlas

</p>

</footer>

</div>

<script src="script.js"></script>

</body>
</html>
